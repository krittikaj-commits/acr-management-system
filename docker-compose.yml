# ACR Management System — Local Development Services
# Usage: docker-compose up -d

services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: acr-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-YourPassword123}
      MSSQL_PID: Express
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - acr-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: acr-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - acr-network
    restart: unless-stopped

  localstack:
    image: localstack/localstack
    container_name: acr-localstack
    environment:
      SERVICES: s3,ses
      DEFAULT_REGION: ${AWS_REGION:-ap-southeast-1}
      DOCKER_HOST: unix:///var/run/docker.sock
    ports:
      - "4566:4566"
    volumes:
      - localstack-data:/var/lib/localstack
      - ./scripts/localstack-init.sh:/etc/localstack/init/ready.d/init.sh
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - acr-network
    restart: unless-stopped

volumes:
  mssql-data:
    driver: local
  redis-data:
    driver: local
  localstack-data:
    driver: local

networks:
  acr-network:
    driver: bridge
